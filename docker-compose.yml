# LCGVAP - Liberian Cyprus Graduates Veteran Alumina Platform
# Docker Compose (paths match repo: LCGVAP-Backend / LCGVAP-Frontend)

services:
  postgres:
    image: postgres:15-alpine
    container_name: lcgvap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-lcgvap}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_in_production}
      POSTGRES_DB: ${DB_NAME:-lcgvap_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - lcgvap-network
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-lcgvap} -d ${DB_NAME:-lcgvap_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lcgvap-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_pass}
      # redis-cli uses this for authenticated health checks (avoid shell quoting bugs)
      REDISCLI_AUTH: ${REDIS_PASSWORD:-redis_secure_pass}
    command:
      - redis-server
      - "--requirepass"
      - "${REDIS_PASSWORD:-redis_secure_pass}"
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - lcgvap-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./LCGVAP-Backend
      dockerfile: Dockerfile
    container_name: lcgvap-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Keep internal API port stable so reverse-proxy (nginx) can target backend:3001.
      PORT: "3001"
      BASE_URL: ${BASE_URL:-http://localhost:3001}
      DATABASE_URL: postgresql://${DB_USER:-lcgvap}:${DB_PASSWORD:-secure_password_change_in_production}@postgres:5432/${DB_NAME:-lcgvap_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      SYSTEM_NAME: ${SYSTEM_NAME:-LCGVAP}
      SYSTEM_FULL_NAME: ${SYSTEM_FULL_NAME:-Liberian Cyprus Graduates Veteran Alumina Platform}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      ADMIN_CREATION_SECRET: ${ADMIN_CREATION_SECRET:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lcgvap-network
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./LCGVAP-Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_SYSTEM_NAME: ${SYSTEM_NAME:-LCGVAP}
        VITE_SYSTEM_FULL_NAME: ${SYSTEM_FULL_NAME:-Liberian Cyprus Graduates Veteran Alumina Platform}
    container_name: lcgvap-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - lcgvap-network

  nginx:
    image: nginx:alpine
    container_name: lcgvap-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - lcgvap-network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  backend_uploads:
    driver: local

networks:
  lcgvap-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
